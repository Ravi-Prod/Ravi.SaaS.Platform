name: Frontend CI

on:
  push:
    branches:
      - main

jobs:

  build:

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend/ravi-saas-ui

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm install

      - name: Build Application
        run: npm run build