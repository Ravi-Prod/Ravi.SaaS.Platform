name: Backend CI

on:
  push:
    branches:
      - main

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore Packages
        run: dotnet restore backend/Ravi.SaaS.Platform.sln

      - name: Build Solution
        run: dotnet build backend/Ravi.SaaS.Platform.sln --no-restore

      - name: Publish API
        run: dotnet publish backend/Ravi.SaaS.Platform.sln -c Release -o publish